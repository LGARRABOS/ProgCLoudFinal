name: Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: eu-west-3
  TF_WORKING_DIR: terraform

jobs:
  terraform:
    name: Terraform & Ansible CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda package
        run: python terraform/scripts/build_lambda.py lambda terraform/build

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="assume_role_arn=${{ secrets.AWS_ROLE_ARN }}" \
            -var="project_prefix=lgarrabos" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan
        continue-on-error: true

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        continue-on-error: true

      - name: Infracost breakdown
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          infracost breakdown --path=. \
            --format=json \
            --out-file=/tmp/infracost.json \
            --terraform-var="assume_role_arn=${{ secrets.AWS_ROLE_ARN }}" \
            --terraform-var="project_prefix=lgarrabos" \
            --terraform-var="aws_region=${{ env.AWS_REGION }}"
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and ansible-lint
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible lint
        run: ansible-lint ansible/
